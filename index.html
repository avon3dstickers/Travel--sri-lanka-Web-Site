<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tusker Ways | The Extraordinary Awaits</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGold: '#D4AF37',
                        brandDark: '#0a0a0c',
                        primaryTeal: '#00BFA5',
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        .bg-layer {
            background-color: #000;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%), url('tusker-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: contrast(1.1) brightness(0.9);
            transform: scale(1.05);
            animation: slowPan 30s infinite alternate ease-in-out;
        }

        @keyframes slowPan {
            from {
                transform: scale(1.05) translate(0, 0);
            }

            to {
                transform: scale(1.1) translate(-1%, 1%);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 1s ease-out forwards;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-300 {
            animation-delay: 0.3s;
        }

        .delay-500 {
            animation-delay: 0.5s;
        }

        .glass-panel {
            background: rgba(10, 10, 12, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #e6e6e6, #ffffff);
            color: #000;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
        }

        .floating-logo {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s ease;
        }

        .floating-logo:hover {
            transform: scale(1.05);
        }

        /* Typography adjustments for "luxurious, mysterious" feel */
        .lux-heading {
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .lux-sub {
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col items-center justify-between lg:justify-center overflow-x-hidden">

    <!-- Cinematic Background -->
    <div class="bg-layer"></div>

    <!-- Top Left Floating Logo -->
    <header
        class="absolute top-0 left-0 w-full p-6 md:p-10 z-50 flex flex-col md:flex-row items-center md:items-start justify-between pointer-events-none gap-4">
        <div
            class="pointer-events-auto bg-black/30 backdrop-blur-md border border-white/20 p-3 md:p-4 rounded-3xl shadow-[0_0_40px_rgba(255,255,255,0.15)] transition-transform hover:scale-105 duration-300 floating-logo ring-1 ring-white/10">
            <img src="logo.png" alt="Tusker Ways" class="h-16 md:h-20 lg:h-24 w-auto object-contain">
        </div>

        <a href="mailto:info@tuskerways.com"
            class="pointer-events-auto flex items-center gap-2 px-5 py-2.5 rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white/90 hover:text-white hover:bg-black/60 hover:border-white/30 text-xs md:text-sm font-medium tracking-widest uppercase transition-all duration-300 shadow-lg">
            <svg class="w-4 h-4 md:w-5 md:h-5 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
            </svg>
            info@tuskerways.com
        </a>
    </header>

    <!-- Main Content Layout -->
    <main class="w-full flex-1 flex flex-col lg:flex-row relative z-10 pt-32 pb-16 lg:py-0 min-h-[100dvh]">

        <!-- Empty left side for background immersion -->
        <div class="hidden lg:block lg:w-1/2 relative"></div>

        <!-- Right side typography & form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center lg:justify-end px-6 md:px-12 lg:pr-24 xl:pr-32">

            <div
                class="w-full max-w-xl glass-panel p-8 md:p-14 rounded-3xl lg:bg-transparent lg:backdrop-blur-none lg:border-none lg:p-0">

                <!-- Headlines -->
                <div class="mb-14">
                    <div
                        class="inline-block px-5 py-2 border border-brandGold/40 bg-brandGold/10 rounded-full mb-6 shadow-[0_0_20px_rgba(212,175,55,0.15)] animate-fade-up opacity-0">
                        <span class="text-brandGold text-xs uppercase tracking-[0.25em] font-bold">Coming Soon</span>
                    </div>

                    <h1
                        class="font-display lux-heading text-4xl md:text-5xl lg:text-6xl font-semibold text-white mb-6 uppercase animate-fade-up opacity-0 delay-100">
                        Unveiling <span class="text-brandGold/90 font-light italic">Sri Lanka</span>:<br>
                        The Extraordinary Awaits.
                    </h1>

                    <p
                        class="font-body lux-sub text-lg md:text-xl text-white/80 font-light animate-fade-up delay-300 opacity-0">
                        A new dawn in immersive, tailor-made travel.
                    </p>
                </div>

                <!-- Form Area - Centered further down -->
                <div class="w-full mt-8 animate-fade-up delay-300 opacity-0">
                    <div class="text-center lg:text-left mb-6">
                        <p class="text-sm md:text-base text-white/70 uppercase tracking-[0.15em] font-medium">
                            Be the first to embark on the journey
                        </p>
                    </div>

                    <form
                        onsubmit="event.preventDefault(); window.location.href = 'mailto:info@tuskerways.com?subject=Tusker%20Ways%20Waitlist%20Signup&body=Hello,%20please%20add%20my%20email%20address%20to%20the%20waitlist:%0A%0A' + encodeURIComponent(document.getElementById('waitlistEmail').value);"
                        class="flex flex-col sm:flex-row gap-4 w-full">
                        <input type="email" id="waitlistEmail" placeholder="Email Address" required
                            class="input-glass flex-1 px-6 py-4 rounded-xl font-body text-base w-full">

                        <button type="submit"
                            class="btn-premium px-8 py-4 rounded-xl font-display font-semibold uppercase tracking-widest text-sm whitespace-nowrap text-center flex items-center justify-center">
                            Join the Waitlist
                        </button>
                    </form>
                </div>

            </div>

        </div>

    </main>

    <!-- Subtle Footer -->
    <footer class="absolute bottom-6 left-0 w-full text-center z-20 pointer-events-none opacity-50">
        <p class="text-[10px] md:text-xs font-body tracking-widest uppercase text-white">&copy; 2026 Tusker Ways Sri
            Lanka</p>
    </footer>

</body>

</html>
