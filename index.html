<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tusker Ways | The Extraordinary Awaits</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGold: '#D4AF37',
                        brandDark: '#0a0a0c',
                        primaryTeal: '#00BFA5',
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        .bg-layer {
            background-color: #000;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%), url('tusker-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: contrast(1.1) brightness(0.9);
            transform: scale(1.05);
            animation: slowPan 30s infinite alternate ease-in-out;
        }

        @keyframes slowPan {
            from {
                transform: scale(1.05) translate(0, 0);
            }

            to {
                transform: scale(1.1) translate(-1%, 1%);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 1s ease-out forwards;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-300 {
            animation-delay: 0.3s;
        }

        .delay-500 {
            animation-delay: 0.5s;
        }

        .glass-panel {
            background: rgba(10, 10, 12, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #e6e6e6, #ffffff);
            color: #000;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
        }

        .floating-logo {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s ease;
        }

        .floating-logo:hover {
            transform: scale(1.05);
        }

        /* Typography adjustments for "luxurious, mysterious" feel */
        .lux-heading {
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .lux-sub {
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col items-center justify-between lg:justify-center overflow-x-hidden">

    <!-- Cinematic Background -->
    <div class="bg-layer"></div>

    <!-- Top Left Floating Logo -->
    <header
        class="absolute top-0 left-0 w-full p-6 md:p-10 z-50 flex flex-col items-center md:items-start pointer-events-none gap-5">
        <div
            class="pointer-events-auto inline-block bg-black/30 backdrop-blur-md border border-white/20 p-3 md:p-4 rounded-3xl shadow-[0_0_40px_rgba(255,255,255,0.15)] transition-transform hover:scale-105 duration-300 floating-logo ring-1 ring-white/10">
            <img src="logo.png" alt="Tusker Ways" class="h-16 md:h-20 lg:h-24 w-auto object-contain">
        </div>

        <div class="pointer-events-auto flex flex-col sm:flex-row sm:flex-wrap items-center md:items-start justify-center md:justify-start gap-3">
            <a href="tel:+94711503252"
                class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white/90 hover:text-white hover:bg-black/60 hover:border-white/30 text-xs md:text-sm font-medium tracking-widest uppercase transition-all duration-300 shadow-lg">
                <svg class="w-4 h-4 md:w-5 md:h-5 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
                +94 71 150 3252
            </a>
            
            <a href="https://wa.me/94711503252" target="_blank" rel="noopener noreferrer"
                class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white/90 hover:text-white hover:bg-black/60 hover:border-white/30 text-xs md:text-sm font-medium tracking-widest uppercase transition-all duration-300 shadow-lg">
                <svg class="w-4 h-4 md:w-5 md:h-5 text-brandGold" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12.031 2.051C6.442 2.051 1.907 6.587 1.907 12.176c0 1.785.467 3.52 1.353 5.06l-1.921 7.02l7.185-1.884a10.05 10.05 0 003.507.643h.004c5.589 0 10.125-4.536 10.125-10.125s-4.536-10.125-10.125-10.125zM12.031 20.34h-.003a8.38 8.38 0 01-4.276-1.168l-.307-.182l-3.179.834l.848-3.098l-.201-.321a8.375 8.375 0 01-1.282-4.47c0-4.636 3.774-8.411 8.412-8.411c2.251 0 4.363.876 5.952 2.467c1.589 1.59 2.465 3.7 2.465 5.952c-.001 4.635-3.776 8.411-8.412 8.411H12.031zm4.618-6.315c-.253-.127-1.498-.74-1.731-.823c-.231-.085-.4-.127-.569.127c-.169.253-.654.823-.801.992c-.149.169-.297.19-.55.063c-.253-.127-1.07-.394-2.039-1.256c-.754-.672-1.264-1.503-1.413-1.756c-.149-.253-.016-.39.111-.516c.114-.113.253-.296.379-.444c.127-.148.169-.253.253-.422c.085-.169.043-.317-.021-.444c-.063-.127-.569-1.373-.779-1.881c-.205-.494-.413-.427-.569-.434c-.149-.007-.318-.007-.487-.007c-.169 0-.444.063-.676.317c-.231.253-.886.866-.886 2.112s.908 2.449 1.034 2.618c.127.169 1.786 2.727 4.327 3.823c.604.261 1.076.417 1.444.534c.607.193 1.159.165 1.596.1c.489-.072 1.498-.612 1.708-1.203c.21-.591.21-1.097.148-1.204c-.065-.106-.233-.169-.487-.296z"></path>
                </svg>
                WhatsApp
            </a>

            <a href="mailto:info@tuskerways.com"
                class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white/90 hover:text-white hover:bg-black/60 hover:border-white/30 text-xs md:text-sm font-medium tracking-widest uppercase transition-all duration-300 shadow-lg">
                <svg class="w-4 h-4 md:w-5 md:h-5 text-brandGold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
                info@tuskerways.com
            </a>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="w-full flex-1 flex flex-col lg:flex-row relative z-10 pt-32 pb-16 lg:py-0 min-h-[100dvh]">

        <!-- Empty left side for background immersion -->
        <div class="hidden lg:block lg:w-1/2 relative"></div>

        <!-- Right side typography & form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center lg:justify-end px-6 md:px-12 lg:pr-24 xl:pr-32">

            <div
                class="w-full max-w-xl glass-panel p-8 md:p-14 rounded-3xl lg:bg-transparent lg:backdrop-blur-none lg:border-none lg:p-0">

                <!-- Headlines -->
                <div class="mb-14">
                    <div
                        class="inline-block px-5 py-2 border border-brandGold/40 bg-brandGold/10 rounded-full mb-6 shadow-[0_0_20px_rgba(212,175,55,0.15)] animate-fade-up opacity-0">
                        <span class="text-brandGold text-xs uppercase tracking-[0.25em] font-bold">Coming Soon</span>
                    </div>

                    <h1
                        class="font-display lux-heading text-4xl md:text-5xl lg:text-6xl font-semibold text-white mb-6 uppercase animate-fade-up opacity-0 delay-100">
                        Unveiling <span class="text-brandGold/90 font-light italic">Sri Lanka</span>:<br>
                        The Extraordinary Awaits.
                    </h1>

                    <p
                        class="font-body lux-sub text-lg md:text-xl text-white/80 font-light animate-fade-up delay-300 opacity-0">
                        A new dawn in immersive, tailor-made travel.
                    </p>
                </div>

                <!-- Form Area - Centered further down -->
                <div class="w-full mt-8 animate-fade-up delay-300 opacity-0">
                    <div class="text-center lg:text-left mb-6">
                        <p class="text-sm md:text-base text-white/70 uppercase tracking-[0.15em] font-medium">
                            Be the first to embark on the journey
                        </p>
                    </div>

                    <form
                        onsubmit="event.preventDefault(); window.location.href = 'mailto:info@tuskerways.com?subject=Tusker%20Ways%20Waitlist%20Signup&body=Hello,%20please%20add%20my%20email%20address%20to%20the%20waitlist:%0A%0A' + encodeURIComponent(document.getElementById('waitlistEmail').value);"
                        class="flex flex-col sm:flex-row gap-4 w-full">
                        <input type="email" id="waitlistEmail" placeholder="Email Address" required
                            class="input-glass flex-1 px-6 py-4 rounded-xl font-body text-base w-full">

                        <button type="submit"
                            class="btn-premium px-8 py-4 rounded-xl font-display font-semibold uppercase tracking-widest text-sm whitespace-nowrap text-center flex items-center justify-center">
                            Join the Waitlist
                        </button>
                    </form>
                </div>

            </div>

        </div>

    </main>

    <!-- Subtle Footer -->
    <footer class="absolute bottom-6 left-0 w-full text-center z-20 pointer-events-none opacity-50">
        <p class="text-[10px] md:text-xs font-body tracking-widest uppercase text-white">&copy; 2026 Tusker Ways Sri
            Lanka</p>
    </footer>

</body>

</html>
