         const compressImage = (file, width, quality) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleFactor = Math.min(1, width / img.width);
                        canvas.width = img.width * scaleFactor;
                        canvas.height = img.height * scaleFactor;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => reject("Failed to load image");
                };
                reader.onerror = () => reject("Failed to read file");
            });
        };

                                    <textarea value={data.storyTitle || ""} onChange={e => updateField('storyTitle', e.target.value)} className="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2 text-sm h-20 focus:ring-1 focus:ring-primary" placeholder="Beyond the Postcard" />
                                </div>

                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-slate-500 uppercase font-bold">Main Highlight Paragraph</label>
                                    <textarea value={data.storyP1 || ""} onChange={e => updateField('storyP1', e.target.value)} className="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2 text-sm h-20 focus:ring-1 focus:ring-primary" placeholder="Most people visit this island..." />

                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-1">
                                <label className="text-[10px] text-slate-500 uppercase font-bold">Closing Italic Note</label>
                                <textarea value={data.storyP3 || ""} onChange={e => updateField('storyP3', e.target.value)} className="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2 text-sm h-20 focus:ring-1 focus:ring-primary italic" placeholder="When you travel with us..." />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] text-slate-500 uppercase font-bold">Final Welcome Statement</label>
                                <textarea value={data.storyClosing || ""} onChange={e => updateField('storyClosing', e.target.value)} className="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-2 text-sm h-20 focus:ring-1 focus:ring-primary font-bold" placeholder="Welcome to the wild side..." />
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pt-4 border-t border-white/5 mt-4">

                                onUpload={(url) => updateField('storyImg1', url)}
                                onChange={e => updateField('storyImg1', e.target.value)}

                            <ImageUpload
                                label="Story Image 2 (Square/Top Right)"
                                height="h-48"
                                value={data.storyImg2}
                                onUpload={(url) => updateField('storyImg2', url)}
                                onChange={e => updateField('storyImg2', e.target.value)}
                            />
                            <ImageUpload
                                label="Story Image 3 (Square/Bottom Left)"

                                value={data.storyImg3}
                                onUpload={(url) => updateField('storyImg3', url)}

                            <ImageUpload
                                label="Story Image 4 (Tall/Bottom Right)"
                                height="h-48"

                    <section className="glass p-8 rounded-3xl space-y-6">
                        <h2 className="text-xl font-bold">Our Pillars</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {(data.pillars || []).map((p, i) => (
                                <div key={i} className="p-6 bg-slate-900/40 rounded-2xl border border-slate-800 space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="space-y-1">
                                            <label className="text-[8px] text-slate-500 uppercase font-bold">Icon (Lucide Name)</label>

                                        <div className="space-y-1">
                                            <label className="text-[8px] text-slate-500 uppercase font-bold">Heading</label>

                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[8px] text-slate-500 uppercase font-bold">Description</label>
                                        <textarea value={p.desc || ""} onChange={e => updatePillar(i, 'desc', e.target.value)} className="w-full bg-slate-800 border-none rounded-lg p-2 text-xs h-20" />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="glass p-8 rounded-3xl space-y-6">
                        <h2 className="text-xl font-bold">Founder's Note</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <ImageUpload
                                label="Founder Portrait"
                                height="h-48"
                                value={data.founderImg}
                                onUpload={(url) => updateField('founderImg', url)}
                                onChange={e => updateField('founderImg', e.target.value)}
                            />
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] text-slate-500 uppercase font-bold">Founder Name</label>

                                <div className="space-y-1">
                                    <label className="text-[10px] text-slate-500 uppercase font-bold">Quote Text</label>
                                    <textarea value={data.founderQuote || ""} onChange={e => updateField('founderQuote', e.target.value)} className="w-full bg-slate-900 border-none rounded-xl px-4 py-2 text-sm h-24 focus:ring-1 focus:ring-primary italic" />
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="glass p-8 rounded-3xl space-y-6">
                        <h2 className="text-xl font-bold">The Tusker's Path (6 Steps)</h2>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                            {(data.path || []).map((s, i) => (
                                <div key={i} className="p-4 bg-slate-900/40 rounded-2xl border border-slate-800 space-y-3">
                                    <p className="text-[8px] text-primary font-bold uppercase tracking-widest">Step {i + 1}</p>
                                    <input type="text" value={s.title || ""} onChange={e => updateStep(i, 'title', e.target.value)} className="w-full bg-slate-800 border-none rounded-lg p-2 text-xs font-bold" placeholder="Heading" />
                                    <textarea value={s.desc || ""} onChange={e => updateStep(i, 'desc', e.target.value)} className="w-full bg-slate-800 border-none rounded-lg p-2 text-xs h-16" placeholder="Short description" />
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const TypographySection = ({ config, onUpdate }) => {
            const fonts = [
                { id: "'Elegant Woman Demo', serif", name: "Elegant Woman (Serif)" },
                { id: "'Outfit', sans-serif", name: "Outfit (Sans)" },
                { id: "'Playfair Display', serif", name: "Playfair Display (Serif)" },
                { id: "'Inter', sans-serif", name: "Inter (Sans)" }
            ];

            const HeadingControl = ({ level, label, description }) => {
                const fontKey = `h${level}Font`;
                const sizeKey = `h${level}Size`;
                const defaultSize = level === 1 ? 72 : level === 2 ? 32 : level === 3 ? 24 : 14;

                return (
                    <div className="p-6 bg-slate-900/30 rounded-3xl border border-white/5 space-y-6">
                        <div className="flex items-center justify-between">
                            <h3 className="text-sm font-bold text-primary uppercase tracking-widest flex items-center gap-1.5 flex-wrap">
                                <span className="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_10px_rgba(0,194,168,0.5)]"></span>
                                {label}
                            </h3>
                            <span className="text-[10px] font-black text-slate-600 bg-slate-950 px-2.5 py-1 rounded-full border border-white/5">H{level}</span>
                        </div>
                        
                        <p className="text-[10px] text-slate-500 italic leading-relaxed">{description}</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-1.5">
                                <label className="text-[10px] text-slate-400 uppercase font-bold px-1">Font Family</label>
                                <select 
                                    value={config[fontKey] || ""} 
                                    onChange={e => onUpdate({ [fontKey]: e.target.value })}
                                    className="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-3 text-xs focus:ring-1 focus:ring-primary outline-none transition-all"
                                >
                                    <option value="">Default (Browser)</option>
                                    {fonts.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                </select>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-[10px] text-slate-400 uppercase font-bold px-1">Font Size (px)</label>
                                <div className="flex items-center gap-3">
                                    <input 
                                        type="number" 
                                        value={config[sizeKey] || ""} 
                                        onChange={e => onUpdate({ [sizeKey]: parseInt(e.target.value) || 0 })}
                                        placeholder={`Def: ${defaultSize}px`}
                                        className="w-full bg-slate-900 border border-slate-700/50 rounded-xl px-4 py-3 text-xs focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-700"
                                    />
                                    <span className="text-[10px] font-bold text-teal-600">PX</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="space-y-10 animate-fadeIn">
                    <section className="glass p-8 rounded-3xl space-y-2">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-2xl bg-primary/20 flex items-center justify-center text-primary shadow-lg shadow-primary/20">
                                <i data-lucide="type" className="w-5 h-5"></i>
                            </div>
                            <h2 className="text-xl font-bold">Typography Ecosystem</h2>
                        </div>
                        <p className="text-slate-500 text-xs font-medium pl-13">Group headings by identity and control their presence across the entire site.</p>
                    </section>

                    <div className="grid grid-cols-1 gap-8">
                        <HeadingControl 
                            level={1} 
                            label="Heading 1: Master Hero Titles" 
                            description="Main page titles: Unveil the Soul, Our Way, Signature Journeys, Sri Lanka Edit, etc."
                        />
                        <HeadingControl 
                            level={2} 
                            label="Heading 2: Hero Sub-Headlines" 
                            description="Descriptive text positioned under hero titles. Usually larger than body text but smaller than titles."
                        />
                        <HeadingControl 
                            level={3} 
                            label="Heading 3: Section Titles" 
                            description="Experience Page sections: Grand Escapes, Why Choose Us, Our Pillars, Captured Moments."
                        />
                        <HeadingControl 
                            level={4} 
                            label="Heading 4: Action & Detail Tags" 
                            description="Informational items: 15 Years of Experience, Our Partners, What our travelers say."
                        />
                    </div>
                </div>
            );
        };

        const SettingsSection = ({ config, onUpdate, onExport, onImport }) => {
            return (
                <section className="glass p-8 rounded-3xl animate-fadeIn space-y-12">
                    <div className="space-y-6">
                        <h2 className="text-xl font-bold flex items-center gap-2">
                             <i data-lucide="shield-check" className="w-5 h-5 text-primary"></i>
                             Data Protection & Backup
                        </h2>
                        <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-700/50">
                            <h3 className="text-sm font-bold text-white mb-2 uppercase tracking-widest">Backup & Restore</h3>
                            <p className="text-[10px] text-slate-400 mb-6 leading-relaxed">
                                ඔබගේ වෙබ් අඩවියේ තොරතුරු බ්‍රවුසරයේ (Local Storage) පමණක් ගබඩා වේ. Cache clear කළහොත් ඒවා මැකී යා හැක. 
                                එබැවින්, ඔබගේ සැකසුම් සුරක්ෂිතව තබා ගැනීමට **Backup** එකක් බාගත කර තබා ගන්න.
                            </p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <button 
                                    onClick={onExport}
                                    className="flex items-center justify-center gap-3 px-6 py-4 bg-primary/10 border border-primary/30 rounded-xl text-primary font-bold hover:bg-primary/20 transition-all"
                                >
                                    <i data-lucide="download" className="w-4 h-4"></i>
                                    Download JSON Backup
                                </button>
                                
                                <label className="flex items-center justify-center gap-3 px-6 py-4 bg-slate-800 border border-slate-700 rounded-xl text-white font-bold hover:bg-slate-700 cursor-pointer transition-all">
                                    <i data-lucide="upload" className="w-4 h-4"></i>
                                    Restore from File
                                    <input type="file" accept=".json" onChange={onImport} className="hidden" />
                                </label>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6 pt-6 border-t border-white/5">
                        <h2 className="text-xl font-bold">Form Integrations</h2>
                        <div className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[10px] text-slate-500 uppercase font-bold">Google Web App URL (Plan Your Escape)</label>
                                <input
                                    type="text"
                                    value={config.scriptUrl || ""}
                                    onChange={(e) => onUpdate({ scriptUrl: e.target.value })}
                                    className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none text-sm text-white"
                                    placeholder="https://script.google.com/macros/s/..."
                                />
                                <p className="text-[10px] text-slate-500 mt-1">This URL is used for the "Plan Your Escape" form submissions across the site.</p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('admin-root'));
        
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                    // Re-initialize icons after state change
                    setTimeout(() => {
                        if (window.lucide) window.lucide.createIcons();
                    }, 100);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError("");
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError("Invalid email or password. Please try again.");
                }
            };

            const handleLogout = async () => {
                await auth.signOut();
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#080b10] text-slate-400">
                        <i data-lucide="loader-2" className="w-8 h-8 animate-spin text-primary mr-3"></i>
                        <span className="text-sm font-medium uppercase tracking-widest">Verifying Access...</span>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center px-4 bg-[#080b10]">
                        <div className="w-full max-w-md glass p-10 rounded-3xl animate-fadeIn space-y-8 relative overflow-hidden">
                            {/* Decorative background blur */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-primary/20 blur-[50px] rounded-full pointer-events-none"></div>
                            
                            <div className="text-center space-y-3 relative z-10">
                                <div className="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center text-primary mx-auto mb-6 border border-primary/20 shadow-[0_0_30px_rgba(20,184,166,0.3)]">
                                    <i data-lucide="lock" className="w-6 h-6"></i>
                                </div>
                                <h2 className="text-2xl font-black uppercase tracking-tighter">Tusker <span className="text-primary">Admin Access</span></h2>
                                <p className="text-xs text-slate-400 font-medium tracking-wide">Enter your credentials to continue</p>
                            </div>
                            
                            {error && (
                                <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-2xl text-[11px] text-center font-bold flex items-center justify-center gap-2 relative z-10">
                                    <i data-lucide="alert-circle" className="w-4 h-4"></i>
                                    {error}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-5 relative z-10">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] text-slate-500 uppercase font-bold tracking-wider pl-1">Email Address</label>
                                    <div className="relative">
                                        <i data-lucide="mail" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                                        <input 
                                            type="email" 
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="w-full bg-slate-900/60 border border-slate-700/50 rounded-2xl pl-11 pr-4 py-3.5 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none text-white transition-all" 
                                            placeholder="admin@tuskerways.com"
                                            required 
                                        />
                                    </div>
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] text-slate-500 uppercase font-bold tracking-wider pl-1">Password</label>
                                    <div className="relative">
                                        <i data-lucide="key" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                                        <input 
                                            type="password" 
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full bg-slate-900/60 border border-slate-700/50 rounded-2xl pl-11 pr-4 py-3.5 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none text-white transition-all" 
                                            placeholder="••••••••"
                                            required 
                                        />
                                    </div>
                                </div>
                                <button 
                                    type="submit"
                                    className="w-full py-4 mt-4 rounded-2xl bg-primary text-white font-bold text-sm shadow-[0_10px_30px_rgba(20,184,166,0.3)] hover:shadow-[0_10px_40px_rgba(20,184,166,0.5)] hover:-translate-y-0.5 active:scale-95 transition-all flex justify-center items-center gap-2 uppercase tracking-widest"
                                >
                                    Authenticate <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="animate-fadeIn">
                    <div className="bg-[#020617] border-b border-white/5 px-6 py-3 flex flex-wrap gap-4 justify-between items-center text-xs sticky top-0 z-50 backdrop-blur-md">
                        <div className="flex items-center gap-3 text-slate-400">
                            <div className="w-6 h-6 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                                <i data-lucide="user" className="w-3 h-3"></i>
                            </div>
                            <span className="font-medium">Authenticated as <b className="text-white ml-1">{user.email}</b></span>
                        </div>
                        <button onClick={handleLogout} className="text-slate-400 hover:text-red-400 font-bold flex items-center gap-2 transition-colors bg-slate-900/50 hover:bg-red-400/10 px-4 py-2 rounded-lg border border-slate-700 hover:border-red-400/30">
                            <i data-lucide="log-out" className="w-3.5 h-3.5"></i>
                            Secure Logout
                        </button>
                    </div>
                    <AdminPanel />
                </div>
            );
        };

        root.render(<App />);
    </script>
</body>

</html>
